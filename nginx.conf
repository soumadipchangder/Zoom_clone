events {
    worker_processes 1;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 7860;

        # ── WebSocket signaling (must come before /api to avoid conflict) ──
        location /ws/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;

            # Critical headers for WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Keep WebSocket connections alive (long meetings)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── FastAPI REST endpoints ─────────────────────────────────────────
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── FastAPI docs (optional) ────────────────────────────────────────
        location /docs {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://127.0.0.1:8000;
        }

        # ── Next.js (everything else) ──────────────────────────────────────
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR (dev) — not needed in prod but harmless
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
